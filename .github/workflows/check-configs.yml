name: Check configs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    paths:
      - sources.txt

concurrency:
  group: check-configs
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Smoke test scripts
        run: python -m py_compile scripts/*.py

      - name: Setup Xray
        uses: actions/cache@v4
        id: xray-cache
        with:
          path: /opt/xray
          key: xray-linux-64-v1

      - name: Download Xray
        if: steps.xray-cache.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/xray
          TAG=$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
          curl -fsSL "https://github.com/XTLS/Xray-core/releases/download/${TAG}/Xray-linux-64.zip" -o /tmp/xray.zip
          sudo unzip -o /tmp/xray.zip -d /opt/xray
          sudo chmod +x /opt/xray/xray

      - name: Run checker
        id: run-checker
        working-directory: scripts
        continue-on-error: true
        env:
          XRAY_BIN: /opt/xray/xray
          PARALLEL_WORKERS: "32"
          TEST_TIMEOUT: "5"
          TEST_URLS: "http://cp.cloudflare.com/generate_204"
          TCP_TIMEOUT: "1.5"
          XRAY_START_WAIT: "4"
          RETRY_PER_URL: "0"
          HTTP_CONNECT_TIMEOUT: "2"
          SKIP_TCP_CHECK: "0"
          XRAY_VALIDATE_CONFIG: "0"
          SUBSCRIPTION_TITLE: "SakhaCfg Subscription"
          SUBSCRIPTION_EXPIRES_AT: "2026-12-31"
          SUBSCRIPTION_LIMIT_GB: "100"
          MAX_WORKING_CONFIGS: "50"
          GEO_TIMEOUT: "2"
        run: python main.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/working.txt output/working.json output/failed.json
          if git diff --staged --quiet; then
            echo "Нет изменений — commit не нужен"
          else
            WORKING=$(jq -r .total_working output/working.json)
            CHECKED=$(jq -r .total_checked output/working.json)
            git commit -m "update: ${WORKING}/${CHECKED} working configs"
            git push
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: working-configs
          path: |
            output/working.txt
            output/working.json
            output/failed.json
          retention-days: 7

      - name: Mark checker status
        if: always()
        run: |
          if [ "${{ steps.run-checker.outcome }}" != "success" ]; then
            echo "::warning::Checker step completed with issues. See logs and output/failed.json."
          fi
